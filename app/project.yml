name: VortX
options:
  bundleIdPrefix: com.stremiox
  developmentLanguage: en
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  MPVKit:
    url: https://github.com/mpvkit/MPVKit
    exactVersion: "0.41.0"
targets:
  VortX:
    type: application
    platform: iOS
    sources:
      - Sources
      # Sources/Player/HDRDisplayMode.swift logs through DiagnosticsLog, which lives in
      # SourcesShared. This web-host target pulls in Sources (incl. the player) but not the rest
      # of SourcesShared, so it needs this one self-contained (Foundation-only) file explicitly.
      - path: SourcesShared/DiagnosticsLog.swift
      - Resources/Assets.xcassets
      - path: Resources/server.js
        buildPhase: resources
      - path: Resources/fonts
        optional: true
        type: folder
        buildPhase: resources
      # Bundled Anime4K glsl shaders (MIT), loaded by the libmpv player's Anime4K upscaling preset.
      # Folder reference so the .glsl files land under a `shaders/` subdir, resolved at runtime from
      # Bundle.main (see MPVMetalViewController.anime4kShaderPaths).
      - path: Resources/shaders
        optional: true
        type: folder
        buildPhase: resources
    dependencies:
      - package: MPVKit
        product: MPVKit-GPL
      - framework: Vendor/nodejs-mobile/NodeMobile.xcframework
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stremiox.app
        MARKETING_VERSION: "0.3.8"
        CURRENT_PROJECT_VERSION: "122"
        # Web-host target ONLY: this is the WKWebView app (ContentView/StremioWebView). The shared
        # NodeServer preload starts an 11471 reverse-proxy of web.stremio.com solely so that webview can
        # load the UI from a loopback origin. The native targets (VortXiOSNative, VortXTV) have no
        # webview, so this flag gates that proxy off there to shed footprint (issue #56, 2 GB Apple TV HD).
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) STREMIOX_WEB_HOST"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Resources/Info-iOS.plist
        INFOPLIST_KEY_CFBundleDisplayName: VortX
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "NO"
  # Native iPhone/iPad client on stremio-core + libmpv (0.3.0), the same engine + player as the
  # Apple TV app, with a touch UI in SourcesiOS. Replaces the web-host VortX target once it
  # reaches parity (see docs/REBASE-iOS.md). Built alongside it so the web host keeps working
  # until cutover. Mirrors the proven tvOS native target's settings.
  VortXiOSNative:
    type: application
    platform: iOS
    # Raise the per-app jetsam ceiling so the in-process node server + mpv 4K buffers don't trip the
    # memory limit (the device server-death). Applied when the IPA is (re)signed; sideload tools
    # (AltStore/Sideloadly) carry this entitlement for free Apple IDs, as emulators do.
    entitlements:
      path: VortXiOSNative.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    sources:
      - SourcesiOS # touch UI
      - SourcesShared # shared engine bridge, models, account, ranking, profiles, themes
      - Sources/Player # libmpv player core (shared with tvOS)
      - Sources/NodeServer.swift # embedded streaming server
      - Sources/PlayerScreen.swift # full native touch player (controls, tracks, resume), reused by the native UI
      - Sources/ShareSheet.swift # share sheet used by the player handoff
      - Sources/ExternalPlayer.swift # external-player handoff used by the player
      - Resources/Assets.xcassets
      # Localization: a single String Catalog (en source + per-language translations) shared by every
      # native target. SwiftUI Text/Label/Button string literals localize from it automatically.
      - Resources/Localizable.xcstrings
      - path: Resources/server.js
        buildPhase: resources
      - path: Resources/fonts
        optional: true
        type: folder
        buildPhase: resources
      # Bundled Anime4K glsl shaders (MIT), loaded by the libmpv player's Anime4K upscaling preset.
      # Folder reference so the .glsl files land under a `shaders/` subdir, resolved at runtime from
      # Bundle.main (see MPVMetalViewController.anime4kShaderPaths).
      - path: Resources/shaders
        optional: true
        type: folder
        buildPhase: resources
    dependencies:
      - package: MPVKit
        product: MPVKit-GPL
      - framework: Vendor/nodejs-mobile/NodeMobile.xcframework
        embed: true
        codeSign: true
      # The Rust stremio-core engine (staticlib xcframework, iOS slices), linked, not embedded.
      - framework: Vendor/StremioXCore.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stremiox.app.native
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Player/VortX-Bridging.h
        MARKETING_VERSION: "0.3.8"
        CURRENT_PROJECT_VERSION: "122"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Resources/Info-iOS.plist
        INFOPLIST_KEY_CFBundleDisplayName: VortX
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "NO"
  # Native macOS app (NOT Catalyst, which MPVKit can't link). Reuses the same native SwiftUI UI
  # (SourcesiOS), shared engine, and the now-cross-platform libmpv player. Streaming server:
  # nodejs-mobile has no macOS slice, so instead of embedding node as a library (iOS/tvOS), the Mac
  # bundles a standalone `node` binary (Resources/node-darwin-arm64, fetched by the pre-build script)
  # and spawns server.js in a child process (SourcesShared/MacNodeServer.swift). This restores TORRENT
  # playback on the Mac — it is no longer Direct-Links-Only. MPVKit's macos-arm64 slices and the
  # stremio-core macOS slice are complete.
  VortXMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0" # MPVKit's macOS slices (Libuavs3d) require macOS 14
    sources:
      - SourcesiOS # the native SwiftUI UI also runs on macOS
      - SourcesShared # includes MacNodeServer.swift (the child-process node server)
      - Sources/Player
      - Sources/PlayerScreen.swift
      - Sources/ShareSheet.swift
      - Sources/ExternalPlayer.swift
      - Resources/Assets.xcassets
      - Resources/Localizable.xcstrings # shared String Catalog (en + translations)
      - path: Resources/server.js # Stremio streaming server, run by the bundled node binary
        buildPhase: resources
      - path: Resources/node-darwin-arm64 # standalone node executable (fetched pre-build)
        buildPhase: resources
      - path: Resources/fonts
        optional: true
        type: folder
        buildPhase: resources
      # Bundled Anime4K glsl shaders (MIT), loaded by the libmpv player's Anime4K upscaling preset.
      # Folder reference so the .glsl files land under a `shaders/` subdir, resolved at runtime from
      # Bundle.main (see MPVMetalViewController.anime4kShaderPaths).
      - path: Resources/shaders
        optional: true
        type: folder
        buildPhase: resources
    dependencies:
      - package: MPVKit
        product: MPVKit-GPL # macos-arm64_x86_64 slice
      - framework: Vendor/StremioXCore.xcframework
        embed: false # now carries an aarch64-apple-darwin slice
    preBuildScripts:
      # Download the standalone node binary before the resource copy phase runs. Idempotent:
      # skips the ~95MB download when the right version is already present.
      - script: '"${SRCROOT}/scripts/fetch-node-macos.sh"'
        name: Fetch node binary (macOS streaming server)
        outputFiles:
          - "$(SRCROOT)/Resources/node-darwin-arm64"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stremiox.mac
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Player/VortX-Bridging.h
        MARKETING_VERSION: "0.3.8"
        CURRENT_PROJECT_VERSION: "122"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: "YES"
        # Base plist (merged under the generated keys) carrying the ATS arbitrary-loads exception +
        # the local-network usage string, so a plain-http custom server (Tailscale / LAN) connects on
        # macOS the same way it does on iOS/tvOS. Mac was the only target shipping default ATS (issue #58).
        INFOPLIST_FILE: Resources/Info-macOS.plist
        INFOPLIST_KEY_CFBundleDisplayName: VortX
        # Name the product "VortX" (not the target name "VortXMac") so the .app, the executable, and
        # the generated CFBundleName all read "VortX" — the menu bar, Dock, Finder, and the installed
        # app all show "VortX". The bundle id (com.stremiox.mac) and the Xcode target/scheme name stay
        # VortXMac (internal; the deeper bundle-id/target rename is the 0.4 work).
        PRODUCT_NAME: VortX
        CODE_SIGNING_ALLOWED: "NO"
  # tvOS has NO WebKit, so this is a native client (SwiftUI + addon HTTP + libmpv),
  # NOT the iOS web-host app. It shares only the MPVKit player core (Sources/Player).
  VortXTV:
    type: application
    platform: tvOS
    entitlements:
      path: VortXTV.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    sources:
      - SourcesTV
      - SourcesShared # OS-agnostic layer: engine bridge, models, account, ranking, themes
      - Sources/Player
      - Sources/NodeServer.swift
      - ResourcesTV/Assets.xcassets
      - Resources/Localizable.xcstrings # shared String Catalog (en + translations)
      - path: Resources/server.js
        buildPhase: resources
      - path: Resources/fonts
        optional: true
        type: folder
        buildPhase: resources
      # Bundled Anime4K glsl shaders (MIT), loaded by the libmpv player's Anime4K upscaling preset.
      # Folder reference so the .glsl files land under a `shaders/` subdir, resolved at runtime from
      # Bundle.main (see MPVMetalViewController.anime4kShaderPaths).
      - path: Resources/shaders
        optional: true
        type: folder
        buildPhase: resources
    dependencies:
      - package: MPVKit
        product: MPVKit-GPL
      - framework: Vendor/nodejs-mobile/NodeMobile.xcframework
        embed: true
        codeSign: true
      # The Rust stremio-core engine (staticlib xcframework), linked, not embedded.
      - framework: Vendor/StremioXCore.xcframework
        embed: false
      # AVKit must be an explicit link: the only thing used from it is the
      # UIWindow.avDisplayManager CATEGORY (no link-time symbols), so autolink
      # plus the dead-stripping linker silently dropped the framework, the
      # category never loaded at runtime, and every avDisplayManager access
      # aborted with an unrecognized selector (sim AND device, 2026-06-10).
      - sdk: AVKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stremiox.tv
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Player/VortX-Bridging.h
        MARKETING_VERSION: "0.3.8"
        CURRENT_PROJECT_VERSION: "122"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: ResourcesTV/Info-tvOS.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES" # explicit UIScene adoption (tvOS 26 compliance)
        INFOPLIST_KEY_CFBundleDisplayName: VortX
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "NO"
  # Lite/debrid-only tvOS build. This omits NodeMobile and server.js entirely,
  # so the app cannot create or play torrents even if old preferences say otherwise.
  VortXTVLite:
    type: application
    platform: tvOS
    entitlements:
      path: VortXTVLite.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    sources:
      - SourcesTV
      - SourcesShared # OS-agnostic layer: engine bridge, models, account, ranking, themes
      - Sources/Player
      - ResourcesTV/Assets.xcassets
      - Resources/Localizable.xcstrings # shared String Catalog (en + translations)
      # Same full font set as the Full build. Lite briefly dropped the CJK face, but libass's
      # CoreText fallback does NOT cover CJK in this build (the original tofu bug), and the
      # trimmed face costs ~6.5 MB compressed, cheap enough to keep subtitles correct.
      - path: Resources/fonts
        optional: true
        type: folder
        buildPhase: resources
      # Bundled Anime4K glsl shaders (MIT), loaded by the libmpv player's Anime4K upscaling preset.
      # Folder reference so the .glsl files land under a `shaders/` subdir, resolved at runtime from
      # Bundle.main (see MPVMetalViewController.anime4kShaderPaths).
      - path: Resources/shaders
        optional: true
        type: folder
        buildPhase: resources
    dependencies:
      - package: MPVKit
        product: MPVKit-GPL
      # The Rust stremio-core engine (staticlib xcframework), linked, not embedded.
      - framework: Vendor/StremioXCore.xcframework
        embed: false
      - sdk: AVKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stremiox.tv.lite
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Player/VortX-Bridging.h
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) STREMIOX_NO_EMBEDDED_SERVER"
        MARKETING_VERSION: "0.3.8"
        CURRENT_PROJECT_VERSION: "122"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: ResourcesTV/Info-tvOS.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: VortX Lite
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGNING_REQUIRED: "NO"
schemes:
  VortX:
    build:
      targets:
        VortX: all
    run:
      config: Debug
    archive:
      config: Release
  VortXiOSNative:
    build:
      targets:
        VortXiOSNative: all
    run:
      config: Debug
    archive:
      config: Release
  VortXTV:
    build:
      targets:
        VortXTV: all
    run:
      config: Debug
    archive:
      config: Release
  VortXTVLite:
    build:
      targets:
        VortXTVLite: all
    run:
      config: Debug
    archive:
      config: Release
