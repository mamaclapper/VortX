<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#15120e" />
    <meta
      name="description"
      content="VortX web: watch your Stremio catalogs in the browser. Direct, debrid, and HLS-first streaming."
    />
    <!-- Open Graph + Twitter card so a shared link (see the Detail Share button) previews with a title
         and description instead of a bare URL. og:image is intentionally omitted until a 1200x630 brand
         asset exists; a title/description preview renders cleanly everywhere in the meantime. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VortX" />
    <meta property="og:title" content="VortX" />
    <meta
      property="og:description"
      content="Watch your Stremio catalogs in the browser. Direct, debrid, and HLS-first streaming."
    />
    <meta property="og:url" content="https://web.vortx.tv/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VortX" />
    <meta
      name="twitter:description"
      content="Watch your Stremio catalogs in the browser. Direct, debrid, and HLS-first streaming."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://v3-cinemeta.strem.io" crossorigin />
    <title>VortX</title>
  </head>
  <body>
    <!-- First-load splash, ported verbatim from the vortx.tv website (src/components/Splash.astro): the
         exact woven-ribbon mark (gradient front over deeper back), ember glow bloom, ribbon draw-on, dot
         pop, then "Everything. / VortXed." rises. A pure-CSS keyframe lifts it away so a JS failure can
         never strand it; main.ts only handles once-per-session + DOM cleanup. -->
    <div id="splash" class="splash" aria-hidden="true">
      <div class="splash-inner">
        <svg class="splash-mark" viewBox="-8 -8 116 116" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="spl-b" x1="0" y1="0" x2="0.25" y2="1">
              <stop offset="0" stop-color="#fbbf24" /><stop offset="0.5" stop-color="#f59e0b" /><stop offset="1" stop-color="#d97706" />
            </linearGradient>
            <linearGradient id="spl-d" x1="0" y1="0" x2="0.25" y2="1">
              <stop offset="0" stop-color="#b45309" /><stop offset="1" stop-color="#7c2d12" />
            </linearGradient>
            <radialGradient id="spl-e" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0" stop-color="#c2440f" stop-opacity="0.65" /><stop offset="0.55" stop-color="#c2440f" stop-opacity="0.2" /><stop offset="1" stop-color="#c2440f" stop-opacity="0" />
            </radialGradient>
          </defs>
          <ellipse class="glow" cx="50" cy="52" rx="64" ry="62" fill="url(#spl-e)" />
          <path class="rib rib-back" pathLength="100" d="M9.2,4 C43.3,29.2 56.7,70.8 90.8,96" stroke="url(#spl-d)" stroke-width="18" stroke-linecap="round" fill="none" />
          <path class="rib rib-front" pathLength="100" d="M90.8,4 C56.7,29.2 43.3,70.8 9.2,96" stroke="url(#spl-b)" stroke-width="18" stroke-linecap="round" fill="none" />
          <circle class="dot" cx="50" cy="50" r="7.2" fill="#fdf6e3" />
        </svg>
        <div class="splash-word"><span class="l1">Everything.</span><span class="l2"><b>VortX</b>ed.</span></div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
