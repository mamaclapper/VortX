name: Release apps (iOS + tvOS + macOS)

# Builds the iOS + tvOS IPAs and the native macOS app from source on GitHub's
# runners and attaches them to the release, so anyone can verify the published
# binaries really come from this code (issue #7). Everything it consumes is
# public: NodeMobile and the fonts from this repo's vendor release, server.js
# from Stremio's CDN, and the stremio-core engine built from the core/ crate.
# The macOS app ships as a drag-to-install .dmg (ad-hoc signed, not notarized).

on:
  # Release-tag caches are isolated per tag, so seed the same exact cache key on
  # main where later release runs can restore it from the default-branch scope.
  push:
    branches: [main]
    paths:
      - ".github/workflows/release-tvos.yml"
      - "core/**"
      - "scripts/**"
  release:
    types: [published]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release-tvos.yml"
      - "core/**"
      - "scripts/**"
      - "app/**"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Attach the built apps to this existing release tag (e.g. v0.3.0-beta13). Leave blank to upload as a run artifact only."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-tvos:
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Select the newest Xcode on the runner
        run: |
          XCODE="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          echo "Selecting $XCODE"
          sudo xcode-select -s "$XCODE"

      - name: Show toolchain
        id: toolchain
        run: |
          xcodebuild -version
          xcrun --sdk appletvos --show-sdk-version
          echo "xcode_version=$(xcodebuild -version | tr ' \n' '-')" >> "$GITHUB_OUTPUT"
          echo "tvos_sdk=$(xcrun --sdk appletvos --show-sdk-version)" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Rust nightly with rust-src (tvOS is a tier 3 target)
        run: |
          rustup toolchain install nightly --profile minimal --component rust-src
          rustup +nightly target add aarch64-apple-ios aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: cargo-${{ runner.os }}-${{ hashFiles('core/Cargo.lock', 'core/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Fetch server deps (NodeMobile, server.js, subtitle fonts)
        run: ./scripts/fetch-server-deps.sh

      - name: Fetch the macOS node runtime
        # VortXMac bundles node + server.js as its streaming server. The binary is gitignored, so
        # it must be fetched BEFORE xcodegen runs — xcodegen validates that the
        # Resources/node-darwin-arm64 source path exists, and fails project generation if it's absent.
        run: ./app/scripts/fetch-node-macos.sh

      - name: Cache stremio-core xcframework
        id: cache-core-xcframework
        uses: actions/cache@v6
        with:
          path: app/Vendor/StremioXCore.xcframework
          key: stremio-core-xcframework-${{ runner.os }}-${{ steps.toolchain.outputs.xcode_version }}-${{ steps.toolchain.outputs.tvos_sdk }}-${{ hashFiles('core/Cargo.lock', 'core/Cargo.toml', 'core/rust-toolchain.toml', 'core/src/**', 'core/include/**', 'scripts/build-core-xcframework.sh') }}

      - name: Build the stremio-core xcframework
        if: steps.cache-core-xcframework.outputs.cache-hit != 'true'
        run: ./scripts/build-core-xcframework.sh

      - name: Generate the Xcode project
        run: cd app && xcodegen generate

      - name: Build tvOS (Full)
        run: |
          xcodebuild -project app/VortX.xcodeproj -scheme VortXTV \
            -configuration Release -destination 'generic/platform=tvOS' \
            -derivedDataPath app/build/ci CODE_SIGNING_ALLOWED=NO build

      - name: Build tvOS (Lite)
        run: |
          xcodebuild -project app/VortX.xcodeproj -scheme VortXTVLite \
            -configuration Release -destination 'generic/platform=tvOS' \
            -derivedDataPath app/build/ci-lite CODE_SIGNING_ALLOWED=NO build

      - name: Build iOS
        run: |
          xcodebuild -project app/VortX.xcodeproj -scheme VortXiOSNative \
            -configuration Release -destination 'generic/platform=iOS' \
            -derivedDataPath app/build/ci-ios CODE_SIGNING_ALLOWED=NO build

      - name: Build macOS
        run: |
          xcodebuild -project app/VortX.xcodeproj -scheme VortXMac \
            -configuration Release -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath app/build/ci-mac CODE_SIGNING_ALLOWED=NO build

      - name: Package the IPAs
        run: |
          mkdir -p out/full/Payload out/lite/Payload out/ios/Payload
          mv app/build/ci/Build/Products/Release-appletvos/VortXTV.app out/full/Payload/
          mv app/build/ci-lite/Build/Products/Release-appletvos/VortXTVLite.app out/lite/Payload/
          mv app/build/ci-ios/Build/Products/Release-iphoneos/VortXiOSNative.app out/ios/Payload/
          (cd out/full && zip -qry ../VortX-tvOS-ci.ipa Payload)
          (cd out/lite && zip -qry ../VortX-tvOS-lite-ci.ipa Payload)
          (cd out/ios && zip -qry ../VortX-iOS-ci.ipa Payload)
          # Reclaim disk before building the .dmg: the IPAs are zipped now, so the tvOS/iOS build
          # trees and the unzipped payloads are dead weight, and the macos-latest runner disk is
          # tight (four MPVKit-GPL builds + node). Without this, `hdiutil create` failed with
          # "No space left on device" on the macOS leg (the empty-asset release for v0.3.6).
          rm -rf out/full/Payload out/lite/Payload out/ios/Payload
          rm -rf app/build/ci app/build/ci-lite app/build/ci-ios
          df -h / | tail -1
          # macOS: an UNSIGNED arm64 app shows "damaged and can't be opened", so ad-hoc sign it
          # (every nested binary gets a valid signature, so the kernel will run it), then package it as
          # a drag-to-install .dmg holding the app plus an /Applications symlink. We can't notarize
          # without an Apple Developer ID, so a downloaded build is still quarantined; the release notes
          # give the one-time right-click-Open / xattr fix.
          MAC_APP="app/build/ci-mac/Build/Products/Release/VortX.app"
          codesign --force --deep --sign - "$MAC_APP"
          codesign -dv "$MAC_APP" 2>&1 | sed -n '1,3p' || true
          DMG_STAGE="$(mktemp -d)"
          mv "$MAC_APP" "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications"
          hdiutil create -volname "VortX" -srcfolder "$DMG_STAGE" -ov -format UDZO out/VortX-macOS-ci.dmg
          shasum -a 256 out/VortX-tvOS-ci.ipa out/VortX-tvOS-lite-ci.ipa out/VortX-iOS-ci.ipa out/VortX-macOS-ci.dmg | tee out/SHA256SUMS-ci.txt

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: VortX-tvOS-ci
          path: |
            out/VortX-tvOS-ci.ipa
            out/VortX-tvOS-lite-ci.ipa
            out/VortX-iOS-ci.ipa
            out/VortX-macOS-ci.dmg
            out/SHA256SUMS-ci.txt

      - name: Attach the CI builds to the release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          mv out/VortX-tvOS-ci.ipa "out/VortX-tvOS-$TAG-ci.ipa"
          mv out/VortX-tvOS-lite-ci.ipa "out/VortX-tvOS-lite-$TAG-ci.ipa"
          mv out/VortX-iOS-ci.ipa "out/VortX-iOS-$TAG-ci.ipa"
          mv out/VortX-macOS-ci.dmg "out/VortX-macOS-$TAG-ci.dmg"
          shasum -a 256 "out/VortX-tvOS-$TAG-ci.ipa" "out/VortX-tvOS-lite-$TAG-ci.ipa" "out/VortX-iOS-$TAG-ci.ipa" "out/VortX-macOS-$TAG-ci.dmg" > out/SHA256SUMS-ci.txt
          gh release upload "$TAG" \
            "out/VortX-tvOS-$TAG-ci.ipa" \
            "out/VortX-tvOS-lite-$TAG-ci.ipa" \
            "out/VortX-iOS-$TAG-ci.ipa" \
            "out/VortX-macOS-$TAG-ci.dmg" \
            out/SHA256SUMS-ci.txt \
            --clobber
          # Remove the older .zip mac asset if this tag had one from a previous run.
          gh release delete-asset "$TAG" "VortX-macOS-$TAG-ci.zip" -y 2>/dev/null || true
