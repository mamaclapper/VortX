name: CodeQL

# Scans the Rust engine crate (core/), the Swift/Rust FFI bridge and the native logic.
# The Swift apps are not scanned here: building them needs the gitignored vendored xcframeworks
# (NodeMobile, MPVKit) and Stremio's proprietary server.js, none of which can live in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly, Mondays 06:00 UTC

jobs:
  analyze:
    name: Analyze (Rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Install Rust nightly
        run: rustup toolchain install nightly --profile minimal

      - name: Build the engine crate
        run: cargo +nightly build --manifest-path core/Cargo.toml --locked

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
