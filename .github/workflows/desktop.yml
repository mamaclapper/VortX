name: Build Desktop (Tauri)

# Cross-platform desktop builds for Windows, Linux, and macOS on Tauri 2. Like the Android workflow,
# this is CI-first: the Windows and Linux bundles cannot be produced on the macOS dev machine, so CI
# is the build feedback loop. It builds installers per platform and uploads them as artifacts. The
# shared stremio-core engine (embedded directly, since the Tauri backend is Rust) and the libmpv
# player land on top of this verified skeleton.

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: "deb,appimage"
          - os: windows-latest
            bundles: "nsis"
          - os: macos-latest
            bundles: "app,dmg"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          # Node 22 (current LTS). Node 20 is EOL (April 2026), and vite 8 requires
          # ^20.19.0 || >=22.12.0, so 22 is the clean floor.
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles ${{ matrix.bundles }}

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: StremioX-desktop-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
