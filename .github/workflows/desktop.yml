name: Build Desktop (Tauri)

# Cross-platform desktop builds for Windows, Linux, and macOS on Tauri 2. Like the Android workflow,
# this is CI-first: the Windows and Linux bundles cannot be produced on the macOS dev machine, so CI
# is the build feedback loop. It builds installers per platform and uploads them as artifacts. The
# shared stremio-core engine (embedded directly, since the Tauri backend is Rust) and the libmpv
# player land on top of this verified skeleton.

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: "deb,appimage"
          - os: windows-latest
            bundles: "nsis"
          - os: macos-latest
            bundles: "app,dmg"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libssl-dev \
            pkg-config

      - uses: actions/setup-node@v6
        with:
          # Node 22 (current LTS). Node 20 is EOL (April 2026), and vite 8 requires
          # ^20.19.0 || >=22.12.0, so 22 is the clean floor.
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      # Stage Linux mpv as an extracted AppImage (AppDir): linuxdeploy bundles the distro mpv plus its
      # full .so closure, then we extract it so the app spawns AppRun directly at runtime - no system
      # mpv, no runtime FUSE. player.rs points the linux mpv path at mpv-linux-x64/AppRun, and
      # tauri.linux.conf.json bundles the AppDir as a directory resource. Inputs are static (distro
      # package + pinned tool), no untrusted event data.
      - name: Stage Linux mpv (extracted AppDir)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y mpv
          work="$(mktemp -d)"; cd "$work"
          curl -fsSL -o linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-appimage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-appimage
          export APPIMAGE_EXTRACT_AND_RUN=1
          export PATH="$work:$PATH"
          desktop_file=/usr/share/applications/mpv.desktop
          if [ ! -f "$desktop_file" ]; then
            desktop_file="$work/mpv.desktop"
            printf '[Desktop Entry]\nType=Application\nName=mpv\nExec=mpv\nIcon=mpv\nCategories=AudioVideo;\nTerminal=false\n' > "$desktop_file"
          fi
          icon="$(find /usr/share/icons /usr/share/pixmaps -iname 'mpv.*' 2>/dev/null | head -1 || true)"
          if [ -z "$icon" ]; then
            icon="$work/mpv.png"
            echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==' | base64 -d > "$icon"
          fi
          ./linuxdeploy.AppImage --appdir AppDir --executable "$(command -v mpv)" \
            --desktop-file "$desktop_file" --icon-file "$icon" --output appimage
          out="$(ls *.AppImage | grep -viE '^linuxdeploy' | head -1)"
          chmod +x "$out"
          "./$out" --appimage-extract
          dest="${GITHUB_WORKSPACE}/desktop/src-tauri/resources/mpv-linux-x64"
          mkdir -p "$(dirname "$dest")"
          rm -rf "$dest"
          mv squashfs-root "$dest"
          test -x "$dest/AppRun"
          echo "staged Linux mpv AppDir at $dest"

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: --bundles ${{ matrix.bundles }}

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: VortX-desktop-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
